# Auto-load dashboard JSON from the mounted dashboards directory.
apiVersion: 1

providers:
  - name: SentinelAI
    orgId: 1
    folder: SentinelAI
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
