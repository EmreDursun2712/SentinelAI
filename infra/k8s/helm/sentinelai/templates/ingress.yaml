{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sentinelai.fullname" . }}
  labels:
    {{- include "sentinelai.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API + health/metrics/docs go to the backend.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "sentinelai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "sentinelai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: {{ include "sentinelai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "sentinelai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          # Everything else is the SPA.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sentinelai.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
