services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinelai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinelai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinelai}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinelai} -d ${POSTGRES_DB:-sentinelai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: sentinelai-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SENTINEL_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sentinelai}:${POSTGRES_PASSWORD:-sentinelai}@postgres:5432/${POSTGRES_DB:-sentinelai}
      SENTINEL_REDIS_URL: ${BACKEND_REDIS_URL:-redis://redis:6379/0}
      SENTINEL_RATE_LIMIT_ENABLED: ${BACKEND_RATE_LIMIT_ENABLED:-true}
      SENTINEL_API_KEY: ${BACKEND_API_KEY:-dev-api-key-change-me}
      SENTINEL_JWT_SECRET: ${BACKEND_JWT_SECRET:-dev-jwt-secret-change-me}
      SENTINEL_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      SENTINEL_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      # Auth cookies: insecure by default for http://localhost dev. Set
      # BACKEND_AUTH_COOKIE_SECURE=true (and SAMESITE=none for cross-site) in prod.
      SENTINEL_ACCESS_TOKEN_TTL_MINUTES: ${BACKEND_ACCESS_TOKEN_TTL_MINUTES:-15}
      SENTINEL_REFRESH_TOKEN_TTL_DAYS: ${BACKEND_REFRESH_TOKEN_TTL_DAYS:-7}
      SENTINEL_AUTH_COOKIE_SECURE: ${BACKEND_AUTH_COOKIE_SECURE:-false}
      SENTINEL_AUTH_COOKIE_SAMESITE: ${BACKEND_AUTH_COOKIE_SAMESITE:-lax}
      # Observability: /metrics on by default; OTel tracing opt-in (needs the
      # otel extra in the image + a collector endpoint).
      SENTINEL_METRICS_ENABLED: ${BACKEND_METRICS_ENABLED:-true}
      SENTINEL_OTEL_ENABLED: ${BACKEND_OTEL_ENABLED:-false}
      SENTINEL_OTEL_EXPORTER_OTLP_ENDPOINT: ${BACKEND_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SENTINEL_BOOTSTRAP_ADMIN_USERNAME: ${BACKEND_BOOTSTRAP_ADMIN_USERNAME:-}
      SENTINEL_BOOTSTRAP_ADMIN_PASSWORD: ${BACKEND_BOOTSTRAP_ADMIN_PASSWORD:-}
      SENTINEL_DETECTION_AUTO_RUN_ON_INGEST: ${BACKEND_DETECTION_AUTO_RUN_ON_INGEST:-false}
      SENTINEL_DEMO_RESET_ENABLED: ${BACKEND_DEMO_RESET_ENABLED:-false}
      SENTINEL_RESPONSE_MODE: ${BACKEND_RESPONSE_MODE:-simulated}
      SENTINEL_RESPONSE_ENABLED: ${BACKEND_RESPONSE_ENABLED:-false}
      SENTINEL_RESPONSE_EXECUTOR: ${BACKEND_RESPONSE_EXECUTOR:-simulated}
      SENTINEL_RESPONSE_ALLOWED_CIDRS: ${BACKEND_RESPONSE_ALLOWED_CIDRS:-}
      SENTINEL_RESPONSE_MAX_BLOCK_MINUTES: ${BACKEND_RESPONSE_MAX_BLOCK_MINUTES:-60}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./ml/artifacts:/app/ml_artifacts:ro
    # Entrypoint (alembic upgrade head → exec uvicorn) is baked into the image.
    # `command:` here is the *extra args* forwarded to uvicorn — only --reload
    # in dev so HMR works with the bind-mounted source above.
    command: ["--reload"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # arq task worker — same image/code as the backend, run with a different
  # entrypoint. Processes the Redis queue (detection batches, reports, drift,
  # retention, optional retrain). See docs/TASK_QUEUE.md.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelai-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy # backend applies DB migrations before the worker runs
    environment:
      SENTINEL_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sentinelai}:${POSTGRES_PASSWORD:-sentinelai}@postgres:5432/${POSTGRES_DB:-sentinelai}
      SENTINEL_REDIS_URL: ${BACKEND_REDIS_URL:-redis://redis:6379/0}
      SENTINEL_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      SENTINEL_RETENTION_DAYS: ${BACKEND_RETENTION_DAYS:-90}
      SENTINEL_ML_RETRAIN_ENABLED: ${BACKEND_ML_RETRAIN_ENABLED:-false}
    volumes:
      - ./backend:/app
      - ./ml/artifacts:/app/ml_artifacts:ro
    # Override the backend's uvicorn entrypoint to run the arq worker instead.
    entrypoint: ["arq", "app.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "arq --check app.worker.WorkerSettings || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Live-flow sensor — LAB ONLY, OFF by default. It only starts with the
  # "sensor" profile (`docker compose --profile sensor up sensor`) AND only runs
  # if SENTINEL_SENSOR_ENABLED=true with authorized CIDRs set. It reads flow
  # logs from a mounted read-only path — no NIC binding, no raw capture.
  sensor:
    build:
      context: ./sensor
      dockerfile: Dockerfile
    container_name: sentinelai-sensor
    profiles: ["sensor"]
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      SENTINEL_SENSOR_ENABLED: ${SENSOR_ENABLED:-false}
      SENTINEL_SENSOR_MODE: ${SENSOR_MODE:-pcap_replay}
      SENTINEL_SENSOR_INPUT_PATH: ${SENSOR_INPUT_PATH:-/logs/conn.log}
      SENTINEL_SENSOR_ALLOWED_CIDRS: ${SENSOR_ALLOWED_CIDRS:-}
      SENTINEL_SENSOR_API_URL: ${SENSOR_API_URL:-http://backend:8000}
      SENTINEL_SENSOR_API_TOKEN: ${SENSOR_API_TOKEN:-}
      SENTINEL_SENSOR_BATCH_SIZE: ${SENSOR_BATCH_SIZE:-100}
      SENTINEL_SENSOR_INTERVAL_SECONDS: ${SENSOR_INTERVAL_SECONDS:-2}
    volumes:
      # Mount your authorized lab's flow logs here, read-only.
      - ${SENSOR_LOG_DIR:-./sensor/samples}:/logs:ro

volumes:
  postgres_data:
  frontend_node_modules:
