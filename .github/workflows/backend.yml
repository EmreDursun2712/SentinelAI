name: backend

on:
  push:
    branches: [main]
    paths: ["backend/**", "sensor/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", "sensor/**", ".github/workflows/backend.yml"]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest -q
      - name: OpenAPI schema is up to date
        # Advisory: surfaces spec drift without reddening the board if a FastAPI
        # minor changes the schema's incidental formatting. Run `make openapi`.
        continue-on-error: true
        run: |
          python -m app.scripts.dump_openapi > openapi.json
          git diff --exit-code openapi.json \
            || (echo "::warning::backend/openapi.json may be stale — run 'make openapi' and commit." && exit 1)

  sensor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sensor/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q

  # Real-Postgres tests (migrations, constraints, FK/transactions) via
  # testcontainers. ubuntu-latest ships Docker, so the container spins up
  # in-job. Separate from the fast unit job above so a unit failure is
  # obvious and this heavier lane can run independently.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Integration tests (real Postgres)
        run: pytest -m integration -q
