name: backend

on:
  push:
    branches: [main]
    paths: ["backend/**", "sensor/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", "sensor/**", ".github/workflows/backend.yml"]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Pytest
        run: pytest -q

  sensor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sensor/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
