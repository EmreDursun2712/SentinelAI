name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install projects + pip-audit
        run: pip install pip-audit -e ./backend -e ./sensor
      # Informational: surfaces known CVEs in the installed dependency set
      # without hard-failing on upstream/transitive advisories outside our control.
      - name: pip-audit
        continue-on-error: true
        run: pip-audit --progress-spinner off

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Gate on what actually ships: high/critical advisories in *production*
      # dependencies. Build/test tooling (vite, vitest, esbuild) never reaches a
      # user, so its dev-only advisories shouldn't red the board.
      - name: npm audit — production deps (high+, gating)
        run: npm audit --omit=dev --audit-level=high
      # Full dev+prod audit for visibility, without failing the build.
      - name: npm audit — full (advisory)
        continue-on-error: true
        run: npm audit --audit-level=high

  sbom:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate CycloneDX SBOM (backend)
        run: |
          pip install cyclonedx-bom
          cd backend && pip install -e . && cyclonedx-py environment -o ../sbom-backend.json || true
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom-*.json
          if-no-files-found: ignore
