name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  workflow_dispatch:

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install projects + pip-audit
        run: pip install pip-audit -e ./backend -e ./sensor
      # Informational: surfaces known CVEs in the installed dependency set
      # without hard-failing on upstream/transitive advisories outside our control.
      - name: pip-audit
        continue-on-error: true
        run: pip-audit --progress-spinner off

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Practical threshold: fail only on high/critical advisories.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  sbom:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate CycloneDX SBOM (backend)
        run: |
          pip install cyclonedx-bom
          cd backend && pip install -e . && cyclonedx-py environment -o ../sbom-backend.json || true
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.json
          if-no-files-found: ignore
