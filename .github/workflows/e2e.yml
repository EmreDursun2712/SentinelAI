name: e2e

# Heavier gate: build the images, bring up the stack, train + stage a model,
# run the smoke test, then tear down. Runs on demand and on a weekly schedule
# (not on every PR) to keep the fast lanes fast.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # weekly Monday 05:00 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Run the E2E gate
        run: make e2e
