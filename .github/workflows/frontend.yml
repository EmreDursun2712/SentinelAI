name: frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**", "backend/openapi.json", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", "backend/openapi.json", ".github/workflows/frontend.yml"]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: API types are up to date
        run: |
          npm run generate:api-types
          git diff --exit-code src/lib/api/schema.d.ts \
            || (echo "::error::frontend api types are stale — run 'make api-types' and commit." && exit 1)
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
