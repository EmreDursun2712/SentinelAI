name: frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**", "backend/openapi.json", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", "backend/openapi.json", ".github/workflows/frontend.yml"]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: API types are up to date
        run: |
          npm run generate:api-types
          git diff --exit-code src/lib/api/schema.d.ts \
            || (echo "::error::frontend api types are stale — run 'make api-types' and commit." && exit 1)
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  # End-to-end (Playwright) against the real compose stack. Advisory while the
  # stack wiring stabilises — failures here don't block, but the report is
  # uploaded for inspection.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Layer the CI override (backend without --reload) over the base compose so
      # every `docker compose` call in this job uses it.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      BACKEND_BOOTSTRAP_ADMIN_USERNAME: admin
      BACKEND_BOOTSTRAP_ADMIN_PASSWORD: "Sentinel-Demo-2026!"
      PLAYWRIGHT_USER: admin
      PLAYWRIGHT_PASSWORD: "Sentinel-Demo-2026!"
      PLAYWRIGHT_BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Train a model artifact (host → mounted into backend)
        run: |
          pip install -e ml
          python -m ml.train --synthetic 20000
      - name: Start data stores + backend (wait for healthchecks)
        # `--wait` blocks until each service's compose healthcheck passes — for
        # the backend that's an in-container curl to /health, which is far more
        # reliable than polling the published port from the runner host. The
        # image entrypoint runs `alembic upgrade head` before uvicorn, so a
        # healthy backend already has migrations applied (no separate step).
        run: docker compose up -d --wait --wait-timeout 240 --build postgres redis backend
      - name: Backend logs (diagnostics)
        run: docker compose logs --no-color backend | tail -60
      - name: Start the frontend
        run: docker compose up -d --build frontend
      - name: Wait for the host ports
        # Backend is already healthy via --wait, so this returns immediately for
        # :8000 and just waits on the Vite dev server for :5173.
        run: npx wait-on http://localhost:5173 http://localhost:8000/health -t 120000
      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -200
