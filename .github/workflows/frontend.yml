name: frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**", "backend/openapi.json", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["frontend/**", "backend/openapi.json", ".github/workflows/frontend.yml"]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: API types are up to date
        run: |
          npm run generate:api-types
          git diff --exit-code src/lib/api/schema.d.ts \
            || (echo "::error::frontend api types are stale — run 'make api-types' and commit." && exit 1)
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  # End-to-end (Playwright) against the real compose stack. Advisory while the
  # stack wiring stabilises — failures here don't block, but the report is
  # uploaded for inspection.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Layer the CI override (backend without --reload) over the base compose so
      # every `docker compose` call in this job uses it.
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      # Use 127.0.0.1, not localhost: the runner's Docker publishes ports on IPv4
      # (0.0.0.0) only, but Node/`localhost` resolves to ::1 (IPv6) first, so
      # host-side checks and the browser's API calls to `localhost` fail. Forcing
      # IPv4 fixes both the readiness poll and the SPA→backend fetches.
      VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
      VITE_WS_BASE_URL: ws://127.0.0.1:8000/api/v1
      BACKEND_BOOTSTRAP_ADMIN_USERNAME: admin
      BACKEND_BOOTSTRAP_ADMIN_PASSWORD: "Sentinel-Demo-2026!"
      PLAYWRIGHT_USER: admin
      PLAYWRIGHT_PASSWORD: "Sentinel-Demo-2026!"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Train a model artifact (host → mounted into backend)
        run: |
          pip install -e ml
          python -m ml.train --synthetic 20000
      - name: Start the stack (wait for healthchecks)
        # `--wait` blocks until every service's compose healthcheck passes (the
        # backend's and frontend's are in-container curls), so we don't depend on
        # host-side polling to decide readiness. The image entrypoint runs
        # `alembic upgrade head` before uvicorn, so a healthy backend already has
        # migrations applied (no separate migrate step).
        run: docker compose up -d --wait --wait-timeout 300 --build postgres redis backend frontend
      - name: Sanity-check host reachability (IPv4)
        run: |
          curl -fsS --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:8000/health
          curl -fsS --retry 10 --retry-delay 3 --retry-all-errors -o /dev/null http://127.0.0.1:5173/
      - name: Backend logs (diagnostics)
        if: always()
        run: docker compose logs --no-color backend | tail -80
      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -200
